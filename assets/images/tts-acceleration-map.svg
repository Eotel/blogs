<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif" font-size="14">
  <rect x="0" y="0" width="1000" height="720" fill="#fafbfc"/>

  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">TTS 推論高速化の手法マップ（2024–2026）</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#5c6c7c">4 つの直交軸：モデル設計（AR / NAR）× レイヤ（モデル / システム / ストリーミング）</text>

  <!-- Axis labels -->
  <line x1="500" y1="80" x2="500" y2="680" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="380" x2="940" y2="380" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="270" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#34495e">AR codec LM 系統</text>
  <text x="730" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#34495e">NAR flow / diffusion 系統</text>
  <text x="80" y="376" font-size="11" fill="#7f8c8d">モデルレイヤ</text>
  <text x="80" y="396" font-size="11" fill="#7f8c8d">＋ システム / ストリーミング</text>

  <!-- Top-left: AR codec LM + Speculative TTS -->
  <rect x="60" y="110" width="420" height="260" rx="14" fill="#dfe9f3" stroke="#2c3e50" stroke-width="2"/>
  <text x="270" y="138" text-anchor="middle" font-weight="700" font-size="16" fill="#1a1a1a">① AR codec LM × 投機的 TTS</text>

  <rect x="80" y="158" width="180" height="60" rx="6" fill="#ffffff" stroke="#34495e"/>
  <text x="170" y="180" text-anchor="middle" font-weight="600" font-size="13">代表モデル</text>
  <text x="170" y="198" text-anchor="middle" font-size="11" fill="#5c6c7c">VALL-E / Llasa / CosyVoice 2</text>
  <text x="170" y="212" text-anchor="middle" font-size="11" fill="#5c6c7c">Spark-TTS / XTTS v2</text>

  <rect x="280" y="158" width="180" height="60" rx="6" fill="#fdebd0" stroke="#b9770e"/>
  <text x="370" y="180" text-anchor="middle" font-weight="600" font-size="13">高速化アプローチ</text>
  <text x="370" y="198" text-anchor="middle" font-size="11" fill="#5c6c7c">draft head × K → verify</text>
  <text x="370" y="212" text-anchor="middle" font-size="11" fill="#5c6c7c">tolerance sampling</text>

  <text x="80" y="245" font-weight="600" font-size="12">主要手法:</text>
  <text x="80" y="265" font-size="12" fill="#34495e">• VADUSA (arXiv 2410.21951)  ／ 〜 5× 加速</text>
  <text x="80" y="284" font-size="12" fill="#34495e">• Llasa+ (arXiv 2508.06262) ／ 1.48× (frozen)</text>
  <text x="80" y="303" font-size="12" fill="#34495e">• SSD (arXiv 2505.15380)  ／ 1.4×</text>
  <text x="80" y="322" font-size="12" fill="#34495e">• PCG: 一般化 tolerance (arXiv 2511.13732)</text>
  <text x="80" y="354" font-size="11" font-style="italic" fill="#7f8c8d">LLM 用 speculative decoding を TTS 特性で拡張</text>

  <!-- Top-right: NAR flow / diffusion + Step distillation -->
  <rect x="520" y="110" width="420" height="260" rx="14" fill="#e8f6f3" stroke="#138d75" stroke-width="2"/>
  <text x="730" y="138" text-anchor="middle" font-weight="700" font-size="16" fill="#1a1a1a">② NAR flow / diffusion × step 削減</text>

  <rect x="540" y="158" width="180" height="60" rx="6" fill="#ffffff" stroke="#138d75"/>
  <text x="630" y="180" text-anchor="middle" font-weight="600" font-size="13">代表モデル</text>
  <text x="630" y="198" text-anchor="middle" font-size="11" fill="#5c6c7c">F5-TTS / Matcha-TTS</text>
  <text x="630" y="212" text-anchor="middle" font-size="11" fill="#5c6c7c">VoiceFlow / FlashSpeech</text>

  <rect x="740" y="158" width="180" height="60" rx="6" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="830" y="180" text-anchor="middle" font-weight="600" font-size="13">高速化アプローチ</text>
  <text x="830" y="198" text-anchor="middle" font-size="11" fill="#5c6c7c">CFM / Rectified Flow</text>
  <text x="830" y="212" text-anchor="middle" font-size="11" fill="#5c6c7c">Consistency / DMD 蒸留</text>

  <text x="540" y="245" font-weight="600" font-size="12">主要手法:</text>
  <text x="540" y="265" font-size="12" fill="#34495e">• F5-TTS (arXiv 2410.06885) ／ NFE 16</text>
  <text x="540" y="284" font-size="12" fill="#34495e">• Fast F5-TTS / EPSS (2505.19931) ／ NFE 7</text>
  <text x="540" y="303" font-size="12" fill="#34495e">• CoMoSpeech / FlashSpeech ／ 1–2 step</text>
  <text x="540" y="322" font-size="12" fill="#34495e">• DMOSpeech 2 (2410.11097) ／ 4 step</text>
  <text x="540" y="354" font-size="11" font-style="italic" fill="#7f8c8d">サンプリング回数を直接減らす</text>

  <!-- Bottom-left: System optimization -->
  <rect x="60" y="400" width="420" height="280" rx="14" fill="#fdebd0" stroke="#b9770e" stroke-width="2"/>
  <text x="270" y="428" text-anchor="middle" font-weight="700" font-size="16" fill="#1a1a1a">③ システム最適化（直交）</text>

  <rect x="80" y="448" width="180" height="60" rx="6" fill="#ffffff" stroke="#b9770e"/>
  <text x="170" y="470" text-anchor="middle" font-weight="600" font-size="13">推論エンジン</text>
  <text x="170" y="488" text-anchor="middle" font-size="11" fill="#5c6c7c">TensorRT-LLM + Triton</text>
  <text x="170" y="502" text-anchor="middle" font-size="11" fill="#5c6c7c">vLLM / SGLang</text>

  <rect x="280" y="448" width="180" height="60" rx="6" fill="#fff4e0" stroke="#d68910"/>
  <text x="370" y="470" text-anchor="middle" font-weight="600" font-size="13">量子化 / kernel</text>
  <text x="370" y="488" text-anchor="middle" font-size="11" fill="#5c6c7c">FP8 KV cache, AWQ/INT8</text>
  <text x="370" y="502" text-anchor="middle" font-size="11" fill="#5c6c7c">FlashAttention-3</text>

  <text x="80" y="538" font-weight="600" font-size="12">特徴:</text>
  <text x="80" y="558" font-size="12" fill="#34495e">• モデル設計と独立に効くため掛け算で重ねられる</text>
  <text x="80" y="577" font-size="12" fill="#34495e">• CosyVoice 2 + TensorRT-LLM で HF 比 〜 4×</text>
  <text x="80" y="596" font-size="12" fill="#34495e">• FP8 KV cache で VRAM とメモリ帯域を半減</text>
  <text x="80" y="615" font-size="12" fill="#34495e">• Edge では INT8 / AWQ が現実解</text>
  <text x="80" y="660" font-size="11" font-style="italic" fill="#7f8c8d">どの系統のモデルとも組み合わせられる土台</text>

  <!-- Bottom-right: Streaming design -->
  <rect x="520" y="400" width="420" height="280" rx="14" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
  <text x="730" y="428" text-anchor="middle" font-weight="700" font-size="16" fill="#1a1a1a">④ ストリーミング設計</text>

  <rect x="540" y="448" width="180" height="60" rx="6" fill="#ffffff" stroke="#c0392b"/>
  <text x="630" y="470" text-anchor="middle" font-weight="600" font-size="13">基本パターン</text>
  <text x="630" y="488" text-anchor="middle" font-size="11" fill="#5c6c7c">chunk-wise + lookahead</text>
  <text x="630" y="502" text-anchor="middle" font-size="11" fill="#5c6c7c">monotonic alignment</text>

  <rect x="740" y="448" width="180" height="60" rx="6" fill="#fcdada" stroke="#922b21"/>
  <text x="830" y="470" text-anchor="middle" font-weight="600" font-size="13">最適化目標</text>
  <text x="830" y="488" text-anchor="middle" font-size="11" fill="#922b21">First-packet latency</text>
  <text x="830" y="502" text-anchor="middle" font-size="11" fill="#922b21">＝ "話し始めるまで"</text>

  <text x="540" y="538" font-weight="600" font-size="12">主要手法:</text>
  <text x="540" y="558" font-size="12" fill="#34495e">• CosyVoice 2 streaming ／ first-packet 〜 150 ms</text>
  <text x="540" y="577" font-size="12" fill="#34495e">• VoXtream (arXiv 2509.15969) ／ 102 ms (GPU)</text>
  <text x="540" y="596" font-size="12" fill="#34495e">• SpeakStream (arXiv 2505.19206)</text>
  <text x="540" y="615" font-size="12" fill="#34495e">• Llasa+ も streaming 化を内包</text>
  <text x="540" y="660" font-size="11" font-style="italic" fill="#7f8c8d">RTF が良くても "話し始め" が遅いと体感は悪い</text>

  <!-- Legend arrows between layers -->
  <text x="500" y="700" text-anchor="middle" font-size="11" fill="#7f8c8d">① + ② はモデル設計、③ ＋ ④ はシステム配置。実運用では 4 象限すべてを掛け合わせる。</text>
</svg>
