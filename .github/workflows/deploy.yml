name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Install Hugo CLI
        run: |
          DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          BASE="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          wget -O "${{ runner.temp }}/${DEB}" "${BASE}/${DEB}"
          wget -O "${{ runner.temp }}/checksums.txt" "${BASE}/hugo_${HUGO_VERSION}_checksums.txt"
          (cd "${{ runner.temp }}" && grep " ${DEB}\$" checksums.txt | sha256sum -c -)
          sudo dpkg -i "${{ runner.temp }}/${DEB}"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Tokyo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Set up uv (for keyword link injection)
        # v8 から major-version tag 提供が止まり immutable release のみ
        # (https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0
        #  "Immutable releases and secure tags")。v8.1.0 = 最新 (2026-04-16)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: |
          uv sync
          echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"
      - name: Inject keyword auto-links
        run: |
          python3 scripts/build_keyword_index.py
          python3 scripts/inject_keyword_links.py public/
      - name: Generate Pagefind search index
        run: npx -y pagefind@latest --site public
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
