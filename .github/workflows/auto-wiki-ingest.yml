name: auto-wiki-ingest

on:
  schedule:
    # 毎週日曜 04:00 JST = 土曜 19:00 UTC
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.x'

      - name: List new posts since last ingest
        id: list
        run: |
          LAST=$(cat .claude/wiki-last-ingest.txt 2>/dev/null || echo "1970-01-01")
          python scripts/list-new-posts-since.py "$LAST" > /tmp/changed-posts.txt
          COUNT=$(wc -l < /tmp/changed-posts.txt | tr -d ' ')
          {
            echo "count=${COUNT}"
            echo "since=${LAST}"
            echo "posts<<POSTS_EOF"
            cat /tmp/changed-posts.txt
            echo "POSTS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "since=${LAST} count=${COUNT}"

      - name: Skip if no new posts
        if: steps.list.outputs.count == '0'
        run: |
          echo "No new posts since ${SINCE}. Nothing to do."
        env:
          SINCE: ${{ steps.list.outputs.since }}

      - name: Run /wiki-ingest via Claude Code Action
        if: steps.list.outputs.count != '0'
        # Pinned to v1 commit SHA for supply-chain hygiene; bump together with claude.yml.
        uses: anthropics/claude-code-action@63322d7b2bc79e7b621b89f41b53ceb8e5a5d314  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Bash is scoped to the commands needed for the ingest flow.
          # Threat model: prompts are workflow-controlled; the only untrusted
          # text reaches Claude is post body content. Output is always a PR
          # (never a direct main push), so a malformed branch is reviewable
          # before merge.
          claude_args: >-
            --allowed-tools
            Edit,Write,Read,Grep,Glob,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(gh issue:*),Bash(python:*),Bash(python3:*),Bash(date:*),Bash(mkdir:*),Bash(cat:*),Bash(echo:*),Bash(ls:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*)
          prompt: |
            次の手順を順に実行してください。

            1. 以下の記事を /wiki-ingest skill で処理し、必要に応じて
               content/wiki/{concepts,tools,guides} のページを新規作成・更新する
               （記事を丸コピーせず、要約・統合した知識として再構成すること）
            2. 完了後、.claude/wiki-last-ingest.txt を本日の日付 (YYYY-MM-DD) に書き換える
            3. ブランチ wiki/auto-ingest-$(date +%Y%m%d) を切って差分を commit
               コミットメッセージ: "chore: auto-ingest wiki updates"
            4. PR を作成（base: main）
               - title: "Auto-ingest: weekly wiki update (since ${{ steps.list.outputs.since }})"
               - body には以下を含める:
                 - 処理対象の記事一覧（リンク付き）
                 - 新規作成 / 更新された Wiki ページの一覧
                 - 何も差分が出なかった場合は PR を作らず、その旨を job summary に書く

            注: hugo はこの runner にインストールされていない。Hugo の整合性は
            既存の .github/workflows/deploy.yml が main マージ後に検証する。

            処理対象の記事 (frontmatter date > ${{ steps.list.outputs.since }}):
            ${{ steps.list.outputs.posts }}
