name: auto-categorize

on:
  push:
    branches: [main]
    paths: ['content/posts/**']
  workflow_dispatch:

jobs:
  categorize:
    # github-actions[bot] 自身が push した commit では再実行しない（loop 防止）
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # gh workflow run deploy.yml で deploy をトリガするため
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.x'

      - name: Run categorize.py
        run: python scripts/categorize.py

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet; then
            echo "No category/tag changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git commit -m "chore: auto-categorize new posts"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy workflow
        # GITHUB_TOKEN で認証された push は downstream の `push` workflow を
        # 起動しない (GitHub の loop 防止仕様)。実際にコミットしたときだけ
        # deploy.yml を明示的にキックして公開を反映させる。
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
