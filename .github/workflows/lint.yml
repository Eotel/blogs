name: Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo CLI
        run: |
          DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          BASE="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          wget -O "${{ runner.temp }}/${DEB}" "${BASE}/${DEB}"
          wget -O "${{ runner.temp }}/checksums.txt" "${BASE}/hugo_${HUGO_VERSION}_checksums.txt"
          (cd "${{ runner.temp }}" && grep " ${DEB}\$" checksums.txt | sha256sum -c -)
          sudo dpkg -i "${{ runner.temp }}/${DEB}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install ast-grep
        run: |
          ASTGREP_VERSION="0.42.1"
          curl -fsSL -o ast-grep.zip \
            "https://github.com/ast-grep/ast-grep/releases/download/${ASTGREP_VERSION}/app-x86_64-unknown-linux-gnu.zip"
          unzip ast-grep.zip
          sudo mv ast-grep /usr/local/bin/ast-grep
          ast-grep --version

      - name: Hugo build (gc, no minify, scratch dir)
        run: hugo --gc --quiet --destination ./public-ci

      - name: Wiki lint (full)
        run: python3 .claude/skills/wiki-lint/scripts/wiki_lint.py

      - name: ast-grep scan (full repo)
        run: ast-grep scan
