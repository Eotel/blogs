baseURL = 'https://eotel.github.io/blogs/'
languageCode = 'ja'
defaultContentLanguage = 'ja'
title = 'Eotel blog'
theme = 'PaperMod'
paginate = 10

[params]
  env = 'production'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  author = 'Eotel'

  [params.homeInfoParams]
    Content = 'Gist と Issue から自動生成する個人ブログ。historical post は hdknr 由来。'

[permalinks]
  [permalinks.page]
    posts = '/posts/:year/:month/:slug/'

[taxonomies]
  category = 'categories'
  tag = 'tags'
  author = 'author'

[menu]
  [[menu.main]]
    identifier = 'categories'
    name = 'カテゴリ'
    url = '/categories/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'タグ'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'authors'
    name = '著者'
    url = '/author/'
    weight = 25
  [[menu.main]]
    identifier = 'wiki'
    name = 'Wiki'
    url = '/wiki/'
    weight = 30
  [[menu.main]]
    identifier = 'archives'
    name = 'アーカイブ'
    url = '/archives/'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = true
    style = 'monokai'
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
