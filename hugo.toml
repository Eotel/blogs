baseURL = 'https://eotel.github.io/blogs/'
languageCode = 'ja'
defaultContentLanguage = 'ja'
timeZone = 'Asia/Tokyo'
title = "Eotel's Notebook"
paginate = 10

[params]
  env = 'production'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  author = 'Eotel'
  mainSections = ['posts']
  comments = true

  [params.homeInfoParams]
    Title = "Eotel's Notebook"
    Content = 'Posts, notes, and wiki. A working notebook by Eotel.'

[permalinks]
  [permalinks.page]
    posts = '/posts/:year/:month/:slug/'

[taxonomies]
  category = 'categories'
  tag = 'tags'
  author = 'author'

[menu]
  [[menu.main]]
    identifier = 'categories'
    name = 'カテゴリ'
    url = '/categories/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'タグ'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'authors'
    name = '著者'
    url = '/author/'
    weight = 25
  [[menu.main]]
    identifier = 'wiki'
    name = 'Wiki'
    url = '/wiki/'
    weight = 30
  [[menu.main]]
    identifier = 'archives'
    name = 'アーカイブ'
    url = '/archives/'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = true
    style = 'monokai'
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[related]
  threshold = 80
  toLower = false
  [[related.indices]]
    name = 'tags'
    weight = 100
  [[related.indices]]
    name = 'categories'
    weight = 80
