<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 640" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="13">
  <style>
    .svc { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.5; }
    .orchestrator { fill: #fff3e0; stroke: #ef6c00; stroke-width: 2; }
    .bus { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .label { fill: #2c3e50; text-anchor: middle; }
    .small { font-size: 11px; fill: #555; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .panel-title { font-size: 15px; font-weight: bold; text-anchor: middle; fill: #1565c0; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arr2); }
    .event { font-size: 11px; fill: #6a1b9a; font-style: italic; }
    .cmd { font-size: 11px; fill: #ef6c00; font-weight: bold; }
    .reply { font-size: 11px; fill: #2e7d32; }
  </style>
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <text x="520" y="28" class="title">Saga の 2 方式：注文フローを書き比べる</text>

  <!-- Left panel: Choreography -->
  <rect x="20" y="50" width="500" height="560" fill="#fafafa" stroke="#bbb" rx="6"/>
  <text x="270" y="78" class="panel-title">Choreography（イベント連鎖）</text>
  <text x="270" y="96" class="label small">中央の制御はなく、各サービスが</text>
  <text x="270" y="112" class="label small">イベントを購読して次の振る舞いを決める</text>

  <rect class="svc" x="60" y="140" width="160" height="50" rx="6"/>
  <text class="label" x="140" y="162" font-weight="bold">Order Service</text>
  <text class="label small" x="140" y="178">注文を受け付ける</text>

  <rect class="svc" x="320" y="140" width="160" height="50" rx="6"/>
  <text class="label" x="400" y="162" font-weight="bold">Inventory Service</text>
  <text class="label small" x="400" y="178">在庫を引き当てる</text>

  <rect class="svc" x="60" y="290" width="160" height="50" rx="6"/>
  <text class="label" x="140" y="312" font-weight="bold">Payment Service</text>
  <text class="label small" x="140" y="328">決済を実行する</text>

  <rect class="svc" x="320" y="290" width="160" height="50" rx="6"/>
  <text class="label" x="400" y="312" font-weight="bold">Shipping Service</text>
  <text class="label small" x="400" y="328">配送を手配する</text>

  <rect class="bus" x="60" y="430" width="420" height="44" rx="6"/>
  <text class="label" x="270" y="458" font-weight="bold">Message Broker（Kafka / SQS / Rabbit）</text>

  <path class="arrow" d="M 140 190 L 140 430"/>
  <text class="event" x="80" y="280">OrderCreated</text>
  <path class="arrow" d="M 270 430 L 400 190"/>
  <text class="event" x="340" y="260">InventoryReserved</text>
  <path class="arrow" d="M 400 190 L 270 430"/>
  <path class="arrow" d="M 270 430 L 140 290"/>
  <text class="event" x="170" y="408">PaymentCompleted</text>
  <path class="arrow" d="M 140 340 L 270 430"/>
  <path class="arrow" d="M 270 430 L 400 290"/>

  <text x="270" y="510" class="label small">利点：疎結合 / 新規サービス追加が容易</text>
  <text x="270" y="528" class="label small">欠点：全体フローの可視化が難しい・</text>
  <text x="270" y="544" class="label small">イベントの循環や順序問題が起きやすい</text>
  <text x="270" y="568" class="label small" font-weight="bold">失敗時：補償イベントを各サービスが</text>
  <text x="270" y="584" class="label small" font-weight="bold">自律的に発火する（連鎖を逆向きに走らせる）</text>

  <!-- Right panel: Orchestration -->
  <rect x="540" y="50" width="480" height="560" fill="#fafafa" stroke="#bbb" rx="6"/>
  <text x="780" y="78" class="panel-title">Orchestration（中央制御）</text>
  <text x="780" y="96" class="label small">オーケストレータが各サービスに</text>
  <text x="780" y="112" class="label small">コマンドを送り、応答を受けて次手を決める</text>

  <rect class="orchestrator" x="700" y="160" width="160" height="60" rx="6"/>
  <text class="label" x="780" y="184" font-weight="bold">Order Saga</text>
  <text class="label" x="780" y="200">Orchestrator</text>
  <text class="label small" x="780" y="214">状態機械として可視化</text>

  <rect class="svc" x="570" y="330" width="130" height="44" rx="6"/>
  <text class="label" x="635" y="350" font-weight="bold">Order</text>
  <text class="label small" x="635" y="364">Service</text>

  <rect class="svc" x="715" y="330" width="130" height="44" rx="6"/>
  <text class="label" x="780" y="350" font-weight="bold">Inventory</text>
  <text class="label small" x="780" y="364">Service</text>

  <rect class="svc" x="860" y="330" width="130" height="44" rx="6"/>
  <text class="label" x="925" y="350" font-weight="bold">Payment</text>
  <text class="label small" x="925" y="364">Service</text>

  <rect class="svc" x="715" y="410" width="130" height="44" rx="6"/>
  <text class="label" x="780" y="430" font-weight="bold">Shipping</text>
  <text class="label small" x="780" y="444">Service</text>

  <path class="arrow" d="M 730 220 L 635 330"/>
  <text class="cmd" x="660" y="270">CreateOrder</text>
  <path class="arrow" d="M 780 220 L 780 330"/>
  <text class="cmd" x="795" y="270">ReserveStock</text>
  <path class="arrow" d="M 830 220 L 925 330"/>
  <text class="cmd" x="900" y="270">ChargeCard</text>
  <path class="arrow" d="M 780 374 L 780 410"/>
  <text class="cmd" x="800" y="395">DispatchShipment</text>

  <path d="M 635 330 Q 660 250 720 220" stroke="#2e7d32" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
  <path d="M 780 330 Q 760 280 780 220" stroke="#2e7d32" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
  <text class="reply" x="725" y="305">replies →</text>

  <text x="780" y="500" class="label small">利点：全体フローが 1 箇所に集約・</text>
  <text x="780" y="516" class="label small">失敗時の補償も中央から指示できる</text>
  <text x="780" y="540" class="label small">欠点：オーケストレータが SPOF になりがち・</text>
  <text x="780" y="556" class="label small">業務ロジックが中央に集中する</text>
  <text x="780" y="580" class="label small" font-weight="bold">失敗時：逆順に Cancel コマンドを発行して</text>
  <text x="780" y="596" class="label small" font-weight="bold">補償トランザクションを実行する</text>
</svg>
