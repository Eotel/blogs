<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1250" viewBox="0 0 2100 1250" role="img" aria-labelledby="title desc">
  <title id="title">Architecture comparison: Monolith, Modular Monolith, and Microservice</title>
  <desc id="desc">Three side-by-side columns comparing deploy units, module boundaries, databases, and communication style.</desc>
  <defs>
    <style>
      .title {
        font-family: Arial;
        font-size: 56px;
        font-weight: 700;
        fill: #24313f;
        text-anchor: middle;
      }
      .label {
        font-family: Arial;
        font-size: 40px;
        font-weight: 700;
        fill: #24313f;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .small-label {
        font-family: Arial;
        font-size: 27px;
        font-weight: 650;
        fill: #415160;
        text-anchor: middle;
      }
      .caption {
        font-family: Arial;
        font-size: 31px;
        font-weight: 600;
        fill: #44515f;
        text-anchor: middle;
      }
      .muted-note {
        font-family: Arial;
        font-size: 24px;
        font-weight: 600;
        fill: #5c6975;
        text-anchor: middle;
      }
      .column-line {
        stroke: #e4e9ee;
        stroke-width: 3;
      }
      .box {
        fill: #dbeaf7;
        stroke: #6f8faa;
        stroke-width: 4;
      }
      .module {
        fill: #e7f1fa;
        stroke: #7e9bb4;
        stroke-width: 3.5;
      }
      .service {
        fill: #eaf3fa;
        stroke: #7894ad;
        stroke-width: 4;
      }
      .db-body {
        fill: #dff0df;
        stroke: #789b78;
        stroke-width: 4;
      }
      .db-line {
        fill: none;
        stroke: #789b78;
        stroke-width: 3;
      }
      .arrow {
        fill: none;
        stroke: #4b5661;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrowhead);
      }
      .network {
        fill: none;
        stroke: #46505a;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 12 10;
        marker-end: url(#arrowhead);
      }
      .connector {
        stroke: #789b78;
        stroke-width: 4;
        stroke-linecap: round;
      }
    </style>
    <marker id="arrowhead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#4b5661"/>
    </marker>
    <g id="database">
      <path class="db-body" d="M 0 22 C 0 9.85 48 0 105 0 C 162 0 210 9.85 210 22 L 210 98 C 210 110.15 162 120 105 120 C 48 120 0 110.15 0 98 Z"/>
      <ellipse class="db-line" cx="105" cy="22" rx="105" ry="22"/>
      <path class="db-line" d="M 0 60 C 0 72.15 48 82 105 82 C 162 82 210 72.15 210 60"/>
      <text class="label" x="105" y="72" style="font-size:34px;">DB</text>
    </g>
    <g id="small-database">
      <path class="db-body" d="M 0 15 C 0 6.7 30 0 66 0 C 102 0 132 6.7 132 15 L 132 62 C 132 70.3 102 77 66 77 C 30 77 0 70.3 0 62 Z"/>
      <ellipse class="db-line" cx="66" cy="15" rx="66" ry="15"/>
      <text class="small-label" x="66" y="50" style="font-size:22px;">DB</text>
    </g>
  </defs>

  <rect width="2100" height="1250" fill="#ffffff"/>
  <line class="column-line" x1="700" y1="90" x2="700" y2="1160"/>
  <line class="column-line" x1="1400" y1="90" x2="1400" y2="1160"/>

  <text class="title" x="350" y="95">Monolith</text>
  <text class="title" x="1050" y="95">Modular Monolith</text>
  <text class="title" x="1750" y="95">Microservice</text>

  <!-- Monolith -->
  <rect class="box" x="115" y="220" width="470" height="520" rx="42"/>
  <text class="label" x="350" y="335">Orders</text>
  <text class="label" x="350" y="445">Users</text>
  <text class="label" x="350" y="555">Payments</text>
  <text class="label" x="350" y="665">Shipping</text>
  <line class="connector" x1="350" y1="740" x2="350" y2="795"/>
  <use href="#database" x="245" y="795"/>
  <text class="caption" x="350" y="1065">
    <tspan x="350" dy="0">1 deploy unit / shared DB</tspan>
    <tspan x="350" dy="42">no internal boundaries</tspan>
  </text>

  <!-- Modular Monolith -->
  <rect class="box" x="780" y="190" width="540" height="610" rx="34" fill="#eef6fb"/>
  <rect class="module" x="825" y="250" width="215" height="195" rx="18"/>
  <rect class="module" x="1060" y="250" width="215" height="195" rx="18"/>
  <rect class="module" x="825" y="515" width="215" height="195" rx="18"/>
  <rect class="module" x="1060" y="515" width="215" height="195" rx="18"/>
  <text class="label" x="932.5" y="347.5">Orders</text>
  <text class="label" x="1167.5" y="347.5">Users</text>
  <text class="label" x="932.5" y="612.5">Payments</text>
  <text class="label" x="1167.5" y="612.5">Shipping</text>
  <path class="arrow" d="M 1040 347 C 1070 347 1060 347 1090 347"/>
  <path class="arrow" d="M 930 445 C 930 478 930 482 930 515"/>
  <path class="arrow" d="M 1040 615 C 1070 615 1060 615 1090 615"/>
  <path class="arrow" d="M 1168 515 C 1168 486 1168 474 1168 445"/>
  <text class="muted-note" x="1050" y="770">internal API calls</text>
  <line class="connector" x1="1050" y1="800" x2="1050" y2="845"/>
  <use href="#database" x="945" y="845"/>
  <line class="db-line" x1="996" y1="870" x2="996" y2="948" opacity="0.45"/>
  <line class="db-line" x1="1050" y1="868" x2="1050" y2="958" opacity="0.45"/>
  <line class="db-line" x1="1104" y1="870" x2="1104" y2="948" opacity="0.45"/>
  <text class="muted-note" x="1050" y="995">one physical DB, logical schemas</text>
  <text class="caption" x="1050" y="1065">
    <tspan x="1050" dy="0">1 deploy unit / clear module boundaries</tspan>
    <tspan x="1050" dy="42">internal API</tspan>
  </text>

  <!-- Microservice -->
  <rect class="service" x="1465" y="225" width="210" height="115" rx="22"/>
  <rect class="service" x="1825" y="225" width="210" height="115" rx="22"/>
  <rect class="service" x="1465" y="585" width="210" height="115" rx="22"/>
  <rect class="service" x="1825" y="585" width="210" height="115" rx="22"/>
  <text class="label" x="1570" y="282.5" style="font-size:35px;">Orders</text>
  <text class="label" x="1930" y="282.5" style="font-size:35px;">Users</text>
  <text class="label" x="1570" y="642.5" style="font-size:35px;">Payments</text>
  <text class="label" x="1930" y="642.5" style="font-size:35px;">Shipping</text>

  <line class="connector" x1="1570" y1="340" x2="1570" y2="370"/>
  <line class="connector" x1="1930" y1="340" x2="1930" y2="370"/>
  <line class="connector" x1="1570" y1="700" x2="1570" y2="730"/>
  <line class="connector" x1="1930" y1="700" x2="1930" y2="730"/>
  <use href="#small-database" x="1504" y="370"/>
  <use href="#small-database" x="1864" y="370"/>
  <use href="#small-database" x="1504" y="730"/>
  <use href="#small-database" x="1864" y="730"/>

  <path class="network" d="M 1675 282 C 1725 282 1775 282 1825 282"/>
  <text class="muted-note" x="1750" y="255">HTTP / gRPC</text>
  <path class="network" d="M 1670 620 C 1735 550 1760 465 1830 315"/>
  <text class="muted-note" x="1748" y="515">event bus</text>
  <path class="network" d="M 1825 642 C 1775 642 1725 642 1675 642"/>
  <text class="caption" x="1750" y="1065">
    <tspan x="1750" dy="0">N deploy units / per-service DB</tspan>
    <tspan x="1750" dy="42">network calls</tspan>
  </text>
</svg>
