<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 540" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="13">
  <style>
    .box { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.5; }
    .db { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; }
    .table-good { fill: #ffffff; stroke: #1565c0; stroke-width: 1; }
    .table-outbox { fill: #fffde7; stroke: #f9a825; stroke-width: 1.5; }
    .worker { fill: #fff3e0; stroke: #ef6c00; stroke-width: 1.5; }
    .broker { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 1.5; }
    .consumer { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; }
    .tx-box { fill: none; stroke: #c62828; stroke-width: 2; stroke-dasharray: 8 4; }
    .label { fill: #2c3e50; text-anchor: middle; }
    .small { font-size: 11px; fill: #555; text-anchor: middle; }
    .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arr3); }
    .step { font-size: 12px; fill: #c62828; font-weight: bold; }
    .tx-label { fill: #c62828; font-weight: bold; font-size: 13px; }
  </style>
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <text x="520" y="28" class="title">Transactional Outbox のデータフロー</text>
  <text x="520" y="50" class="label small">ビジネス更新と outbox 行の INSERT を同一トランザクションに閉じ込めるのが核心</text>

  <!-- Step 1: Application -->
  <rect class="box" x="40" y="100" width="180" height="80" rx="6"/>
  <text class="label" x="130" y="128" font-weight="bold">Application</text>
  <text class="small" x="130" y="146">注文を受け付ける</text>
  <text class="small" x="130" y="162">トランザクション開始</text>

  <!-- Step 2: DB with two tables in a single TX -->
  <rect class="tx-box" x="270" y="80" width="280" height="220" rx="8"/>
  <text class="tx-label" x="410" y="74" text-anchor="middle">同一 DB トランザクション</text>

  <rect class="db" x="280" y="100" width="260" height="190" rx="6"/>
  <text class="label" x="410" y="124" font-weight="bold">PostgreSQL</text>

  <rect class="table-good" x="300" y="142" width="100" height="60" rx="4"/>
  <text class="label" x="350" y="162" font-weight="bold" font-size="12">orders</text>
  <text class="small" x="350" y="180">id, user_id,</text>
  <text class="small" x="350" y="194">total, status</text>

  <rect class="table-outbox" x="420" y="142" width="100" height="60" rx="4"/>
  <text class="label" x="470" y="162" font-weight="bold" font-size="12">outbox</text>
  <text class="small" x="470" y="180">event_type,</text>
  <text class="small" x="470" y="194">payload (jsonb)</text>

  <text class="small" x="410" y="232">INSERT INTO orders ...</text>
  <text class="small" x="410" y="250">INSERT INTO outbox ...</text>
  <text class="small" x="410" y="270" font-weight="bold" fill="#c62828">COMMIT</text>

  <!-- Step 3: Relay worker -->
  <rect class="worker" x="600" y="100" width="180" height="80" rx="6"/>
  <text class="label" x="690" y="128" font-weight="bold">Relay Worker</text>
  <text class="small" x="690" y="146">SELECT ... FOR UPDATE</text>
  <text class="small" x="690" y="162">SKIP LOCKED で取得</text>

  <!-- Step 4: Broker -->
  <rect class="broker" x="820" y="100" width="180" height="80" rx="6"/>
  <text class="label" x="910" y="128" font-weight="bold">Message Broker</text>
  <text class="small" x="910" y="146">Kafka / SQS / RabbitMQ</text>
  <text class="small" x="910" y="162">at-least-once 配送</text>

  <!-- Step 5: Consumer + Inbox -->
  <rect class="consumer" x="600" y="370" width="180" height="80" rx="6"/>
  <text class="label" x="690" y="398" font-weight="bold">Consumer</text>
  <text class="small" x="690" y="416">受信した event_id を</text>
  <text class="small" x="690" y="432">inbox テーブルで重複検査</text>

  <rect class="table-good" x="820" y="375" width="180" height="70" rx="6"/>
  <text class="label" x="910" y="398" font-weight="bold" font-size="12">inbox (consumer 側)</text>
  <text class="small" x="910" y="416">event_id PRIMARY KEY</text>
  <text class="small" x="910" y="432">UNIQUE 制約で冪等化</text>

  <!-- Arrows -->
  <path class="arrow" d="M 220 140 L 280 140"/>
  <text class="step" x="250" y="132">①</text>

  <path class="arrow" d="M 540 140 L 600 140"/>
  <text class="step" x="570" y="132">②</text>

  <path class="arrow" d="M 780 140 L 820 140"/>
  <text class="step" x="800" y="132">③</text>

  <path class="arrow" d="M 690 180 Q 690 280 690 370"/>
  <text class="step" x="700" y="280">④</text>

  <path class="arrow" d="M 780 410 L 820 410"/>
  <text class="step" x="800" y="402">⑤</text>

  <!-- Loop arrow: relay updates outbox -->
  <path d="M 600 160 Q 570 250 540 240" stroke="#ef6c00" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arr3)"/>
  <text x="540" y="208" font-size="10" fill="#ef6c00">published_at 更新</text>

  <!-- Legend / steps -->
  <rect x="40" y="370" width="540" height="140" fill="#fafafa" stroke="#bbb" rx="6"/>
  <text x="60" y="395" font-weight="bold" font-size="13" fill="#2c3e50">処理ステップ</text>
  <text x="60" y="418" font-size="12" fill="#2c3e50">① アプリは orders の更新と outbox への INSERT を同一トランザクションで実行</text>
  <text x="60" y="438" font-size="12" fill="#2c3e50">② COMMIT 完了。outbox 行が永続化されたことが保証される</text>
  <text x="60" y="458" font-size="12" fill="#2c3e50">③ Relay Worker が未送信行をロックして broker に publish</text>
  <text x="60" y="478" font-size="12" fill="#2c3e50">④ 成功時 published_at をセット（at-least-once が前提）</text>
  <text x="60" y="498" font-size="12" fill="#2c3e50">⑤ Consumer は inbox の UNIQUE 制約で重複イベントを排除する</text>
</svg>
