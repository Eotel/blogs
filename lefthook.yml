# Lefthook configuration
# Docs: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md
#
# Skip hooks for an emergency commit/push:
#   LEFTHOOK=0 git commit ...
#
# Run a hook manually:
#   lefthook run pre-commit
#   lefthook run pre-commit --files content/wiki/concepts/rag.md

# pre-commit: staged ファイルのみを検査
# - auto-fix 系 (ruff --fix / black / markdownlint --fix) は同一ファイルを並列に
#   書き換えると非決定になるため "piped: true" で直列化する。
# - 残りの read-only チェックは速いので 1 グループで直列実行する。
# - glob は lefthook 2.x の gobwas/glob 実装に従う。`*.py` でも subdirectory に
#   マッチするが、`scripts/**/*.py` は scripts 直下にマッチしないので注意。
pre-commit:
  piped: true
  commands:
    01-ruff:
      glob: "*.py"
      run: ruff check --fix {staged_files}
      stage_fixed: true
    02-black:
      glob: "*.py"
      run: black --quiet {staged_files}
      stage_fixed: true
    03-markdownlint:
      glob: "content/wiki/**/*.md"
      run: markdownlint-cli2 --fix {staged_files}
      stage_fixed: true
    04-git-secrets:
      run: git secrets --pre_commit_hook -- {staged_files}
    05-shellcheck:
      glob: "*.sh"
      run: shellcheck --severity=warning {staged_files}
    06-frontmatter:
      glob: "content/{posts,wiki}/**/*.md"
      run: python3 scripts/check_frontmatter.py {staged_files}
    07-ast-grep:
      glob: "*.{py,sh}"
      run: ast-grep scan {staged_files}
    08-post-wiki-links:
      glob: "{content/posts/*.md,content/posts/**/*.md}"
      run: python3 .claude/skills/wiki-lint/scripts/wiki_lint.py --post-files {staged_files}

# commit-msg / prepare-commit-msg: 既存 git-secrets 機能を保全
commit-msg:
  commands:
    git-secrets:
      run: git secrets --commit_msg_hook -- {1}

prepare-commit-msg:
  commands:
    git-secrets:
      run: git secrets --prepare_commit_msg_hook -- {1} {2} {3}

# pre-push: 重いが価値の高い検証
# hugo がローカルにない環境ではスキップ（CI で必ず検証されるため安全）。
# 注: `command -v hugo && hugo ... || echo ...` だと hugo build 失敗時に echo へ
# フォールバックして exit 0 になってしまうため、if-else で明示的に分岐する。
#
# lefthook 2.x の pre-push は `run:` 内で `{files}`/`{push_files}` テンプレート
# を参照しないと job を unconditional skip する仕様 (skip_empty / only:
# 等のドキュメント化された opt-out はいずれも 2.1.5 で無効)。これらの job は
# プロジェクト全体スキャンで push 対象ファイルとは無関係に常時走らせたい
# ため、`files: "echo lefthook.yml"` でダミーの非空ファイルリストを与え、
# `run:` の末尾に `# {files}` のシェルコメントを置いて lefthook のフィルタ
# 条件を満たしている。コメントは実行されないので、直前のコマンド (hugo /
# wiki_lint / ast-grep) の exit code がそのまま job の exit code になる。
pre-push:
  parallel: false
  jobs:
    - name: hugo-build
      files: "echo lefthook.yml"
      run: |
        if command -v hugo >/dev/null 2>&1; then
          hugo --gc --quiet --destination .claude/temp/hugo-check
        else
          echo "hugo not installed locally — skipping (CI will verify)"
        fi
        # lefthook 2.x filter satisfier: {files}
    - name: wiki-lint
      files: "echo lefthook.yml"
      run: |
        python3 .claude/skills/wiki-lint/scripts/wiki_lint.py
        # lefthook 2.x filter satisfier: {files}
    - name: ast-grep-full
      files: "echo lefthook.yml"
      run: |
        ast-grep scan
        # lefthook 2.x filter satisfier: {files}
