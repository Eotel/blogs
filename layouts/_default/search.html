{{- define "main" -}}
<article class="search-page">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{- with .Description }}<p class="post-description">{{ . }}</p>{{ end }}
  </header>

  <pagefind-input placeholder="記事を検索…" autofocus></pagefind-input>
  <pagefind-summary></pagefind-summary>
  <pagefind-results show-sub-results>
    {{ `<script type="text/pagefind-template">
      <li class="search-result">
        <a class="search-result__link" href="{{ url | safeUrl }}">
          <h3 class="search-result__title">{{ meta.title }}</h3>
          {{# meta.date }}<time class="search-result__date">{{ meta.date }}</time>{{/ meta.date }}
          <p class="search-result__excerpt">{{+ excerpt +}}</p>
        </a>
      </li>
    </script>` | safeHTML }}
  </pagefind-results>
</article>
{{- end -}}
